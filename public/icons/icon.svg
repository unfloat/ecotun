<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Leaf-green rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1A7F4B"/>
  <!-- Leaf glyph: a simple organic leaf shape in white -->
  <!-- Stem -->
  <path d="M256 380 L256 220" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Leaf body: a teardrop/leaf shape pointing up-right -->
  <path d="M256 220
    C256 220 180 200 160 140
    C200 100 310 110 320 190
    C320 250 256 220 256 220Z"
    fill="#FFFFFF" opacity="0.95"/>
  <!-- Small left branch from stem -->
  <path d="M256 290 C230 270 200 275 185 265" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
